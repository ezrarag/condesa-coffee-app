name: CondesaCoffee
options:
  bundleIdPrefix: com.ragnexus
  deploymentTarget:
    iOS: "17.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.0.0
targets:
  CondesaCoffee:
    type: application
    platform: iOS
    sources: [CondesaCoffee]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ragnexus.condesacoffee
        INFOPLIST_FILE: CondesaCoffee/Info.plist
        CODE_SIGN_ENTITLEMENTS: CondesaCoffee/CondesaCoffee.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
